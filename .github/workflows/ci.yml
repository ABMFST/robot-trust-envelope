name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint
        run: python -m ruff check src tests scripts
      - name: Test
        run: python -m pytest
      - name: Record trace (verifies end-to-end demo)
        run: |
          PYTHONPATH=. python -m scripts.record_trace --out site/demo-trace.json
          test -s site/demo-trace.json
